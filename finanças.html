<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planejamento Financeiro</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#e5e5e5;
}

.wrapper{
    max-width:1000px;
    margin:40px auto;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.menu{
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

.menu button{
    background:#1e1e1e;
    color:white;
    border:none;
    padding:15px 25px;
    cursor:pointer;
    border-radius:5px;
    min-width:180px;
}

.menu button:hover{
    background:#333;
}

.section{
    display:none;
    margin-top:40px;
}

input, select, button.calc{
    width:100%;
    padding:10px;
    margin:8px 0;
    box-sizing:border-box;
}

button.calc{
    background:#1e1e1e;
    color:white;
    border:none;
    cursor:pointer;
}

button.calc:hover{
    background:#333;
}

.resultado{
    margin-top:15px;
    font-weight:bold;
}

.voltar{
    margin-top:20px;
    background:#ccc;
    border:none;
    padding:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="wrapper">

<h1>Planejamento Financeiro</h1>

<div class="menu">
    <button onclick="mostrar('sec1')">Gasto Mensal</button>
    <button onclick="mostrar('sec2')">Quanto Investir</button>
    <button onclick="mostrar('sec3')">Onde Reduzir</button>
    <button onclick="mostrar('sec4')">Como Gastar</button>
</div>

<!-- SEÇÃO 1 -->
<div id="sec1" class="section">
<h2>Gasto Mensal</h2>

<input type="number" id="salario1" placeholder="Salário líquido">
<select id="extra1">
<option value="nao">Possui renda extra?</option>
<option value="sim">Sim</option>
<option value="nao">Não</option>
</select>
<input type="number" id="rendaExtra1" placeholder="Renda extra">

<input type="number" id="fixo1" placeholder="Gastos fixos">
<input type="number" id="conforto1" placeholder="Conforto">
<input type="number" id="conhecimento1" placeholder="Conhecimento">
<input type="number" id="lazer1" placeholder="Lazer">
<input type="number" id="investimento1" placeholder="Investimentos">

<button class="calc" onclick="opcao1()">Calcular</button>
<div id="resultado1" class="resultado"></div>
<button class="voltar" onclick="voltar()">Voltar ao menu</button>
</div>

<!-- SEÇÃO 2 -->
<div id="sec2" class="section">
<h2>Quanto Investir</h2>

<input type="number" id="salario2" placeholder="Salário líquido">
<select id="extra2">
<option value="nao">Possui renda extra?</option>
<option value="sim">Sim</option>
<option value="nao">Não</option>
</select>
<input type="number" id="rendaExtra2" placeholder="Renda extra">

<button class="calc" onclick="opcao2()">Calcular</button>
<div id="resultado2" class="resultado"></div>
<button class="voltar" onclick="voltar()">Voltar ao menu</button>
</div>

<!-- SEÇÃO 3 -->
<div id="sec3" class="section">
<h2>Onde Posso Reduzir</h2>

<input type="number" id="salario3" placeholder="Salário líquido">
<select id="extra3">
<option value="nao">Possui renda extra?</option>
<option value="sim">Sim</option>
<option value="nao">Não</option>
</select>
<input type="number" id="rendaExtra3" placeholder="Renda extra">

<input type="number" id="fixo3" placeholder="Gastos fixos">
<input type="number" id="conforto3" placeholder="Conforto">
<input type="number" id="conhecimento3" placeholder="Conhecimento">
<input type="number" id="lazer3" placeholder="Lazer">
<input type="number" id="investimento3" placeholder="Investimentos">

<select id="filhos3">
<option value="nao">Possui filhos?</option>
<option value="sim">Sim</option>
<option value="nao">Não</option>
</select>
<input type="number" id="quantos3" placeholder="Quantos filhos?">

<button class="calc" onclick="opcao3()">Calcular</button>
<div id="resultado3" class="resultado"></div>
<button class="voltar" onclick="voltar()">Voltar ao menu</button>
</div>

<!-- SEÇÃO 4 -->
<div id="sec4" class="section">
<h2>Como Devo Gastar</h2>

<input type="number" id="salario4" placeholder="Salário líquido">
<select id="extra4">
<option value="nao">Possui renda extra?</option>
<option value="sim">Sim</option>
<option value="nao">Não</option>
</select>
<input type="number" id="rendaExtra4" placeholder="Renda extra">

<select id="filhos4">
<option value="nao">Possui filhos?</option>
<option value="sim">Sim</option>
<option value="nao">Não</option>
</select>
<input type="number" id="quantos4" placeholder="Quantos filhos?">

<button class="calc" onclick="opcao4()">Calcular</button>
<div id="resultado4" class="resultado"></div>
<button class="voltar" onclick="voltar()">Voltar ao menu</button>
</div>

</div>

<script>

function mostrar(id){
    document.querySelectorAll('.section').forEach(sec=>sec.style.display="none");
    document.getElementById(id).style.display="block";
}

function voltar(){
    document.querySelectorAll('.section').forEach(sec=>sec.style.display="none");
}

/* --- FUNÇÕES PYTHON CONVERTIDAS 1:1 --- */

function renda_total(salario,renda){
    return salario + renda;
}

function gastos_totais(fixo,conforto,conhecimento,lazer,investimento){
    return fixo + conforto + conhecimento + lazer + investimento;
}

function calcularRenda(salario,extra,rendaExtra){
    if(extra==="sim"){
        return renda_total(salario,rendaExtra);
    }
    return renda_total(salario,0);
}

function opcao1(){
    let total = calcularRenda(+salario1.value||0,extra1.value,+rendaExtra1.value||0);

    let gastos = gastos_totais(
        +fixo1.value||0,
        +conforto1.value||0,
        +conhecimento1.value||0,
        +lazer1.value||0,
        +investimento1.value||0
    );

    let saldo = total - gastos;

    resultado1.innerHTML =
    `Renda total: R$ ${total.toFixed(2)}<br>
     Gastos totais: R$ ${gastos.toFixed(2)}<br>
     Saldo final: R$ ${saldo.toFixed(2)}`;
}

function opcao2(){
    let total = calcularRenda(+salario2.value||0,extra2.value,+rendaExtra2.value||0);

    resultado2.innerHTML =
    `Seus aportes devem girar entre R$ ${(total*0.15).toFixed(2)} e R$ ${(total*0.30).toFixed(2)}`;
}

function distribuir(total,temFilhos,quantos){
    let filhos = temFilhos==="sim" ? quantos : 0;
    let texto="";

    if(filhos==1){
        texto+=`Fixos: R$ ${(total*0.35).toFixed(2)}<br>`;
        texto+=`Conforto: R$ ${(total*0.20).toFixed(2)}<br>`;
        texto+=`Lazer: R$ ${(total*0.15).toFixed(2)}<br>`;
        texto+=`Conhecimento: R$ ${(total*0.05).toFixed(2)}<br>`;
        texto+=`Investimentos: R$ ${(total*0.25).toFixed(2)}`;
    }
    else if(filhos==2){
        texto+=`Fixos: R$ ${(total*0.40).toFixed(2)}<br>`;
        texto+=`Conforto: R$ ${(total*0.20).toFixed(2)}<br>`;
        texto+=`Lazer: R$ ${(total*0.15).toFixed(2)}<br>`;
        texto+=`Conhecimento: R$ ${(total*0.05).toFixed(2)}<br>`;
        texto+=`Investimentos: R$ ${(total*0.20).toFixed(2)}`;
    }
    else if(filhos==3){
        texto+=`Fixos: R$ ${(total*0.45).toFixed(2)}<br>`;
        texto+=`Conforto: R$ ${(total*0.20).toFixed(2)}<br>`;
        texto+=`Lazer: R$ ${(total*0.15).toFixed(2)}<br>`;
        texto+=`Conhecimento: R$ ${(total*0.05).toFixed(2)}<br>`;
        texto+=`Investimentos: R$ ${(total*0.15).toFixed(2)}`;
    }
    else if(filhos==4){
        texto+=`Fixos: R$ ${(total*0.50).toFixed(2)}<br>`;
        texto+=`Conforto: R$ ${(total*0.20).toFixed(2)}<br>`;
        texto+=`Lazer: R$ ${(total*0.15).toFixed(2)}<br>`;
        texto+=`Conhecimento: R$ ${(total*0.05).toFixed(2)}<br>`;
        texto+=`Investimentos: R$ ${(total*0.10).toFixed(2)}`;
    }
    else if(filhos>=5){
        texto+=`Fixos: R$ ${(total*0.60).toFixed(2)}<br>`;
        texto+=`Conforto: R$ ${(total*0.20).toFixed(2)}<br>`;
        texto+=`Lazer: R$ ${(total*0.15).toFixed(2)}<br>`;
        texto+=`Conhecimento: R$ ${(total*0.05).toFixed(2)}<br>`;
        texto+=`Investimentos: R$ 0.00`;
    }
    else{
        texto+=`Fixos: R$ ${(total*0.30).toFixed(2)}<br>`;
        texto+=`Conforto: R$ ${(total*0.20).toFixed(2)}<br>`;
        texto+=`Lazer: R$ ${(total*0.15).toFixed(2)}<br>`;
        texto+=`Conhecimento: R$ ${(total*0.05).toFixed(2)}<br>`;
        texto+=`Investimentos: R$ ${(total*0.30).toFixed(2)}`;
    }

    return texto;
}

function opcao3(){
    let total = calcularRenda(+salario3.value||0,extra3.value,+rendaExtra3.value||0);

    let gastos = gastos_totais(
        +fixo3.value||0,
        +conforto3.value||0,
        +conhecimento3.value||0,
        +lazer3.value||0,
        +investimento3.value||0
    );

    let saldo = total - gastos;

    resultado3.innerHTML =
    `Renda total: R$ ${total.toFixed(2)}<br>
     Gastos totais: R$ ${gastos.toFixed(2)}<br>
     Saldo final: R$ ${saldo.toFixed(2)}<br><br>`
     + distribuir(total,filhos3.value,+quantos3.value||0);
}

function opcao4(){
    let total = calcularRenda(+salario4.value||0,extra4.value,+rendaExtra4.value||0);

    resultado4.innerHTML =
    distribuir(total,filhos4.value,+quantos4.value||0);
}

</script>

</body>
</html>
